openapi: 3.0.3

info:
  title: AI Strategy Planning API
  description: REST API для системы автоматизации стратегического планирования мультипроекта
  version: 2.0.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local development

tags:
  - name: Auth
    description: Аутентификация
  - name: Multiprojects
    description: Мультипроекты пользователя
  - name: Home
    description: Главная страница
  - name: Context
    description: Страница «Контекст»
  - name: Analysis
    description: Страница «Анализ»
  - name: Goals
    description: Страница «Цели»
  - name: Alternatives
    description: Страница «Альтернативы»
  - name: Plan
    description: Страница «План»

security:
  - cookieAuth: []

# ─────────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token

  schemas:

    # ── Common ──────────────────────────────────────────────
    Error:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: Мультипроект не найден

    # ── Auth ────────────────────────────────────────────────
    AuthRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: ivan_ivanov
        password:
          type: string
          minLength: 8
          example: secret123

    UserResponse:
      type: object
      properties:
        id:
          type: string
          example: 6642a1f0e3b4c10001a2b3c4
        login:
          type: string
          example: ivan_ivanov

    # ── Multiprojects ────────────────────────────────────────
    MultiprojectCreateRequest:
      type: object
      required: [portfolio_name, planning_horizon]
      properties:
        portfolio_name:
          type: string
          example: Цифровая трансформация
        planning_horizon:
          type: string
          format: date
          example: "2026-12-31"

    PlanningStageStatus:
      type: object
      properties:
        stage_name:
          type: string
          enum: [Контекст, Анализ, Цели, Альтернативы, План]
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]

    MultiprojectListItem:
      type: object
      properties:
        id:
          type: string
          example: 6642a1f0e3b4c10001a2b3c4
        portfolio_name:
          type: string
          example: Цифровая трансформация
        planning_horizon:
          type: string
          format: date
        planning_stages_status:
          type: array
          items:
            $ref: '#/components/schemas/PlanningStageStatus'
        created_at:
          type: string
          format: date-time

    # ── Home ────────────────────────────────────────────────
    HomeResponse:
      type: object
      properties:
        portfolio_name:
          type: string
          example: Цифровая трансформация
        planning_stages_status:
          type: array
          items:
            $ref: '#/components/schemas/PlanningStageStatus'
        key_risks:
          description: Ключевые риски из плана (высокий и средний уровень)
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
                example: Риск задержки проекта B из-за отклонения проекта A
              impact:
                type: string
                enum: [LOW, MEDIUM, HIGH]
        resource_analysis:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [Аналитики, Разработчики, Тестировщики]
              required:
                type: integer
                example: 1200
              limit:
                type: integer
                example: 900
              delta:
                type: integer
                description: "< 0 — дефицит, > 0 — профицит"
                example: -300
        strategic_goals:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              specific:
                type: string
                example: Увеличить долю цифровых продаж до 60%
              priority:
                type: string
                enum: [HIGH, MEDIUM, LOW]
        plan_passport:
          type: object
          nullable: true
          description: "null, если план ещё не сформирован"
          properties:
            selected_variant:
              type: string
              example: Сбалансированный вариант
            planning_horizon_months:
              type: integer
              example: 8
            checkpoint_count:
              type: integer
              example: 4
            risk_count:
              type: integer
              example: 5
            constraints_in_attention_count:
              type: integer
              example: 2
            execution_progress:
              type: integer
              description: "Прогресс в процентах"
              example: 25

    # ── Context ─────────────────────────────────────────────
    ContextSubmitRequest:
      type: object
      required: [orientations, projects, portfolio_constraints]
      properties:
        orientations:
          type: array
          minItems: 1
          items:
            type: object
            required: [vision, priority]
            properties:
              vision:
                type: string
                example: Сделать цифровую трансформацию доступной для среднего бизнеса к 2027 году
              priority:
                type: string
                enum: [Высокий, Средний, Низкий]
        projects:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, status, start_date, end_date, workload]
            properties:
              name:
                type: string
                example: Модуль авторизации
              status:
                type: string
                enum: [Завершено, В работе, Не начато]
              start_date:
                type: string
                format: date
                example: "2026-03-01"
              end_date:
                type: string
                format: date
                example: "2026-06-30"
              workload:
                type: object
                required: [analysts, developers, testers]
                properties:
                  analysts:
                    type: integer
                    minimum: 1
                    example: 120
                  developers:
                    type: integer
                    minimum: 1
                    example: 300
                  testers:
                    type: integer
                    minimum: 1
                    example: 80
              constraints:
                type: string
                example: Нельзя переносить релиз
              deviations:
                type: string
                example: Отставание на 10 дней
              description:
                type: string
        dependencies:
          type: array
          items:
            type: object
            required: [main_project_name, dependent_project_name]
            properties:
              main_project_name:
                type: string
                example: Модуль авторизации
              dependent_project_name:
                type: string
                example: Платёжная система
        portfolio_constraints:
          type: object
          required: [analysts_limit, developers_limit, testers_limit, critical_deadline]
          properties:
            analysts_limit:
              type: integer
              minimum: 0
              example: 500
            developers_limit:
              type: integer
              minimum: 0
              example: 900
            testers_limit:
              type: integer
              minimum: 0
              example: 300
            critical_deadline:
              type: string
              format: date
              example: "2026-10-31"

    # ── Analysis ────────────────────────────────────────────
    AnalysisResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
        dependency_graph:
          type: object
          properties:
            nodes:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  status:
                    type: string
                    enum: [Завершено, В работе, Не начато]
            edges:
              type: array
              items:
                type: object
                properties:
                  source:
                    type: string
                  target:
                    type: string
        analysis_risks:
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
                example: Риск задержки проекта B из-за отклонения проекта A
              impact:
                type: string
                enum: [Низкий, Средний, Высокий]
              source:
                type: string
                example: dependency_analysis
        timeline_analysis:
          type: object
          properties:
            summary:
              type: array
              items:
                type: string
              example:
                - Горизонт планирования покрывает портфель частично
                - Наибольшее влияние создаёт цепочка A→B→C
        resource_analysis:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [Аналитики, Разработчики, Тестировщики]
              required:
                type: integer
              limit:
                type: integer
              delta:
                type: integer
                description: "< 0 — дефицит, > 0 — профицит"
        deviation_analysis:
          type: array
          items:
            type: object
            properties:
              project_name:
                type: string
              deviation:
                type: string
              portfolio_danger:
                type: string
                enum: [Низкая, Средняя, Высокая]
              dependency_propagation:
                type: string
        ai_explanation:
          type: string
          example: Портфель реализуем частично. Основная угроза — цепочка зависимостей A→B→C...
        ai_recommendations:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: Перераспределить ресурсы разработчиков
              text:
                type: string
              basis:
                type: string

    # ── Goals ───────────────────────────────────────────────
    GoalItem:
      type: object
      required: [specific, kpi_name, kpi_target_value, kpi_unit, achievable, timebound, priority]
      properties:
        specific:
          type: string
          example: Увеличить долю цифровых продаж до 60%
        kpi_name:
          type: string
          example: Доля цифровых продаж
        kpi_target_value:
          type: number
          example: 60
        kpi_unit:
          type: string
          example: "%"
        achievable:
          type: string
          example: За счёт внедрения новых каналов продаж
        timebound:
          type: string
          format: date
          example: "2027-01-01"
        priority:
          type: string
          enum: [Высокий, Средний, Низкий]
        orientation_ids:
          type: array
          items:
            type: string
          description: ID ориентиров из контекста
        project_names:
          type: array
          items:
            type: string
          description: Названия связанных проектов
        orientation_explanation:
          type: string
          description: Пояснение влияния цели на ориентиры

    GoalsSubmitRequest:
      type: object
      required: [goals]
      properties:
        goals:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GoalItem'

    GoalResponseItem:
      allOf:
        - $ref: '#/components/schemas/GoalItem'
        - type: object
          properties:
            id:
              type: string
            context:
              type: string
              enum: [USER_CREATED, AI_SUGGESTED]
            ai_explanation:
              type: string
              nullable: true
            project_coverage:
              type: object
              properties:
                degree:
                  type: string
                  enum: [Слабое, Умеренное, Сильное]
                explanation:
                  type: string
            realism_check:
              type: object
              properties:
                degree:
                  type: string
                  enum: [Низкая, Средняя, Высокая]
                score:
                  type: integer
                  minimum: 0
                  maximum: 100
                issues:
                  type: array
                  items:
                    type: string

    GoalsResponse:
      type: object
      properties:
        goals:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponseItem'

    GoalSuggestionsResponse:
      type: object
      properties:
        ai_suggestions:
          type: array
          description: Цели, предложенные ИИ на основе контекста и анализа
          items:
            $ref: '#/components/schemas/GoalResponseItem'

    # ── Alternatives ────────────────────────────────────────
    AlternativesResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
        selected_scenario_id:
          type: string
          nullable: true
        scenarios:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
                example: Сбалансированный вариант
              type:
                type: string
                enum: [BALANCED, CONSERVATIVE, RISKY]
              description:
                type: string
              status:
                type: string
                enum: [Допустимый, Рекомендуемый, Требует внимания]
              integral_score:
                type: integer
                minimum: 0
                maximum: 100
              total_duration_months:
                type: number
                example: 8
              risk_count:
                type: integer
              constraint_compliance_percent:
                type: integer
              resource_requirements:
                type: array
                items:
                  type: object
                  properties:
                    role:
                      type: string
                      enum: [Аналитики, Разработчики, Тестировщики]
                    required_hours:
                      type: integer
              strengths:
                type: array
                items:
                  type: string
              weaknesses:
                type: array
                items:
                  type: string
              ai_interpretation:
                type: string
              risks:
                type: array
                items:
                  type: object
                  properties:
                    risk:
                      type: string
                    impact:
                      type: string
                      enum: [Низкий, Средний, Высокий]
              complied_constraints:
                type: array
                items:
                  type: string
              constraints_in_attention:
                type: array
                items:
                  type: string
              projects:
                type: array
                items:
                  type: object
                  properties:
                    project_name:
                      type: string
                    share:
                      type: integer
                    resources:
                      type: object
                      properties:
                        analysts:
                          type: integer
                        developers:
                          type: integer
                        testers:
                          type: integer
        comparison_matrix:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [BALANCED, CONSERVATIVE, RISKY]
              integral_score:
                type: integer
              risk_count:
                type: integer
              constraint_compliance_percent:
                type: integer
              resource_feasibility_percent:
                type: integer
              total_duration_months:
                type: number
              status:
                type: string
                enum: [Допустимый, Рекомендуемый, Требует внимания]

    AlternativeSelectRequest:
      type: object
      required: [scenario_ids]
      properties:
        scenario_ids:
          type: array
          minItems: 1
          items:
            type: string
          example: ["6642a1f0e3b4c10001a2b3c9"]

    # ── Plan ────────────────────────────────────────────────
    PlanResponse:
      type: object
      properties:
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
        selected_scenario_type:
          type: string
          enum: [BALANCED, CONSERVATIVE, RISKY]
        plan_passport:
          type: object
          properties:
            selected_variant:
              type: string
              example: Сбалансированный вариант
            planning_horizon_months:
              type: integer
              example: 8
            checkpoint_count:
              type: integer
              example: 4
            risk_count:
              type: integer
              example: 5
            constraints_in_attention_count:
              type: integer
              example: 2
            execution_progress:
              type: integer
              minimum: 0
              maximum: 100
        stages:
          type: array
          items:
            type: object
            properties:
              stage_number:
                type: integer
              name:
                type: string
                example: Подготовка архитектурной основы
              period:
                type: string
                example: Май 2026 — Июнь 2026
              start_date:
                type: string
                format: date
              end_date:
                type: string
                format: date
              stage_status:
                type: string
                enum: [Планируется, В работе, Выполнен]
              checkpoint:
                type: object
                properties:
                  name:
                    type: string
                    example: Архитектура утверждена
                  date:
                    type: string
                    format: date
                  status:
                    type: string
                    enum: [Запланирована, Достигнута]
              composition:
                type: array
                items:
                  type: object
                  properties:
                    project_name:
                      type: string
                    share:
                      type: integer
                      description: "% выполнения проекта на этом этапе"
                    roles:
                      type: string
              resources:
                type: array
                items:
                  type: object
                  properties:
                    role:
                      type: string
                      enum: [Аналитики, Разработчики, Тестировщики]
                    required_hours:
                      type: integer
                    available_hours:
                      type: integer
                    loading_percent:
                      type: integer
                    loading_degree:
                      type: string
                      enum: [Низкая, Средняя, Высокая, Критичная]
        resource_loading_by_stages:
          description: Сводная таблица загрузки ресурсов по этапам
          type: array
          items:
            type: object
            properties:
              stage_number:
                type: integer
              analysts_percent:
                type: integer
              developers_percent:
                type: integer
              testers_percent:
                type: integer
        plan_risks:
          type: array
          items:
            type: object
            properties:
              risk:
                type: string
              impact:
                type: string
                enum: [Низкий, Средний, Высокий]
        constraints_in_attention:
          type: array
          items:
            type: object
            properties:
              constraint:
                type: string
              actual_value:
                type: string
              impact:
                type: string

# ─────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────
paths:

  # ── AUTH ────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Пользователь создан, токен записан в cookie
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          description: Логин уже занят
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Успешный вход, токен записан в cookie
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход из системы (очищает cookie)
      responses:
        '204':
          description: Cookie удалена
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=; Max-Age=0

  /auth/me:
    get:
      tags: [Auth]
      summary: Данные текущего пользователя
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── MULTIPROJECTS ────────────────────────────────────────────
  /contexts:
    get:
      tags: [Multiprojects]
      summary: Список мультипроектов текущего пользователя
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MultiprojectListItem'

    post:
      tags: [Multiprojects]
      summary: Создать мультипроект
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiprojectCreateRequest'
      responses:
        '201':
          description: Мультипроект создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiprojectListItem'

  /contexts/{contextId}:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    delete:
      tags: [Multiprojects]
      summary: Удалить мультипроект и все связанные данные
      responses:
        '204':
          description: Удалён
        '404':
          description: Не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── HOME ──────────────────────────────────────────────────────
  /contexts/{contextId}/home:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Home]
      summary: Данные главной страницы мультипроекта
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeResponse'
        '404':
          description: Мультипроект не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── CONTEXT ───────────────────────────────────────────────────
  /contexts/{contextId}/context:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    post:
      tags: [Context]
      summary: Сформировать контекст (сохраняет все данные и запускает анализ)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextSubmitRequest'
      responses:
        '202':
          description: Контекст принят, анализ запущен
        '422':
          description: Ошибка валидации (например, цикл в зависимостях, незаполненные поля)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── ANALYSIS ──────────────────────────────────────────────────
  /contexts/{contextId}/analysis:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Analysis]
      summary: Результаты анализа портфеля
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '404':
          description: Анализ ещё не сформирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── GOALS ─────────────────────────────────────────────────────
  /contexts/{contextId}/goals:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Goals]
      summary: Данные страницы «Цели» (сохранённые цели + AI-предложения + конфликты + дублирования)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalsResponse'

    post:
      tags: [Goals]
      summary: Сохранить список целей (полностью заменяет текущий список)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoalsSubmitRequest'
      responses:
        '200':
          description: Цели сохранены, покрытие пересчитано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalsResponse'

  /contexts/{contextId}/goals/suggestions:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Goals]
      summary: Цели, предложенные ИИ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalSuggestionsResponse'
        '404':
          description: Предложения ещё не сформированы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── ALTERNATIVES ──────────────────────────────────────────────
  /contexts/{contextId}/alternatives:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Alternatives]
      summary: Сценарии и матрица сравнения альтернатив
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlternativesResponse'
        '404':
          description: Альтернативы ещё не сформированы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Alternatives]
      summary: Выбрать сценарий для построения плана
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlternativeSelectRequest'
      responses:
        '202':
          description: Сценарий выбран, формирование плана запущено
        '404':
          description: Сценарий не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── PLAN ──────────────────────────────────────────────────────
  /contexts/{contextId}/plan:
    parameters:
      - name: contextId
        in: path
        required: true
        schema:
          type: string

    get:
      tags: [Plan]
      summary: Стратегический план (этапы, ресурсы, риски, паспорт)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '404':
          description: План ещё не сформирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
